name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render (Production)
        if: success() && env.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          curl -s --fail "$RENDER_DEPLOY_HOOK_URL" \
            && echo "Render deploy triggered successfully." \
            || echo "Render deploy hook failed (non-fatal)."
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        continue-on-error: true  # Won't fail CI if Render not configured yet
